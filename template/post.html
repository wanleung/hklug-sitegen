  <!-- post start -->
      <article>

        <h3>[%- post.title -%]</h3>
        <h6>Written by [% post.author %] on [% post.date %].</h6>
        <p><time pubdate datetime="[% post.date %]"></time></p>

        <p>
          [% post.content %]
        </p>

      [% IF post.tags.size %]
      <p class="post-tags">Tags:
        [% FOREACH tag = post.tags %]<a href="/tags/[% tag | uri %]/">[% tag | html %]</a>[% UNLESS loop.last %], [% END %][% END %]
      </p>
      [% END %]
      </article>
      <hr />

  <!-- post end -->
